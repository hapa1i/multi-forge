# Template: openrouter-minimax
# MiniMax models via OpenRouter (direct, no LiteLLM)
#
# Haiku uses Gemma 4 31B as a shared low-cost multimodal tier. Sonnet/opus use
# MiniMax M3 (1M context, native multimodality). M2.7 and M2.5 are available as
# sonnet/opus model_alternatives for explicit proxy requests.
# Requires OPENROUTER_API_KEY in .env (or environment).

proxy:
  family: minimax
  preferred_provider: openrouter
  source: openrouter
  default_port: 8104

  openrouter:
    tiers:
      haiku: google/gemma-4-31b-it
      sonnet: minimax/minimax-m3
      opus: minimax/minimax-m3
    model_alternatives:
      sonnet:
        minimax-m2.7: minimax/minimax-m2.7
        minimax-m2.5: minimax/minimax-m2.5
      opus:
        minimax-m2.7: minimax/minimax-m2.7
        minimax-m2.5: minimax/minimax-m2.5
    tier_overrides: {}
    error_hints: true
