# Template: anthropic-passthrough
# Direct Anthropic Messages API passthrough (Phase 2 audit proxy).
#
# Forwards the raw Anthropic request to api.anthropic.com WITHOUT OpenAI
# translation, so thinking blocks and unknown/future fields survive byte-for-byte
# (signature-safe). This is the only wire shape that preserves signed reasoning.
#
# `provider: litellm` is only a config slot used for credential and upstream
# resolution — `wire_shape: anthropic_passthrough` is the authoritative wire truth
# (GET / reports it). Tiers are informational here; the client's model is forwarded
# unchanged (so --model claude-fable-5 reaches the API as-is; no model_alternatives
# remap applies on this wire shape). Requires ANTHROPIC_API_KEY in .env (or environment).

proxy:
  family: anthropic
  preferred_provider: litellm
  backend: anthropic-passthrough
  default_port: 8096
  wire_shape: anthropic_passthrough

  # Observe by default: 'inspect' hashes + drift-detects outbound system prompts /
  # tool surfaces (metadata only, no body mutation). Raise to 'override' to apply
  # body controls (allowed only on this anthropic_passthrough wire shape).
  intercept:
    mode: inspect

  litellm:
    tiers:
      haiku: claude-haiku-4-5
      sonnet: claude-sonnet-5
      opus: claude-opus-4-8
