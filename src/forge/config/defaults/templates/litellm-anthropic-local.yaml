# Template: litellm-anthropic-local
# Anthropic Claude via local LiteLLM with personal API key (DEVELOPMENT)
#
# Requires:
#   - ANTHROPIC_API_KEY in .env
#
# Backend (LiteLLM on port 4000) starts automatically.
#
# Defaults: sonnet tier -> Sonnet 5, opus tier -> Opus 4.8. Use --model to select
# an alternative (claude-fable-5, claude-opus-4-6, claude-sonnet-4-6).
#
# Note: If you added ANTHROPIC_API_KEY after the backend started,
# restart with: forge model backend stop litellm-4000

proxy:
  family: anthropic
  preferred_provider: litellm
  source: litellm-anthropic-local
  default_port: 8091

  litellm:
    tiers:
      haiku: anthropic/claude-haiku-4-5
      sonnet: anthropic/claude-sonnet-5
      opus: anthropic/claude-opus-4-8
    model_alternatives:
      opus:
        claude-fable-5: anthropic/claude-fable-5
        claude-opus-4-6: anthropic/claude-opus-4-6
      sonnet:
        claude-sonnet-4-6: anthropic/claude-sonnet-4-6
    prompt_caching: passthrough
    error_hints: true
