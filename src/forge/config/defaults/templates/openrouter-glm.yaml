# Template: openrouter-glm
# GLM / Z.ai models via OpenRouter (direct, no LiteLLM)
#
# Haiku uses GLM 4.7 Flash. Sonnet/opus use GLM 5.2.
# Requires OPENROUTER_API_KEY in .env (or environment).

proxy:
  family: glm
  preferred_provider: openrouter
  backend: openrouter
  default_port: 8103

  openrouter:
    tiers:
      haiku: z-ai/glm-4.7-flash
      sonnet: z-ai/glm-5.2
      opus: z-ai/glm-5.2
    tier_overrides:
      sonnet:
        reasoning_effort: high
      opus:
        reasoning_effort: xhigh
    error_hints: true
