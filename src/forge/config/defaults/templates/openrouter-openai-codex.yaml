# Template: openrouter-openai-codex
# OpenAI Codex models via OpenRouter (direct, no LiteLLM)
#
# Requires OPENROUTER_API_KEY in .env (or environment).

proxy:
  family: openai
  preferred_provider: openrouter
  backend: openrouter
  default_port: 8098

  openrouter:
    tiers:
      haiku: openai/gpt-5.1-codex-mini
      sonnet: openai/gpt-5.3-codex
      opus: openai/gpt-5.6-sol
    tier_overrides:
      sonnet:
        reasoning_effort: medium
      opus:
        reasoning_effort: high
        verbosity: high
    error_hints: true
